name: Daily Report to Slack

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install deep-translator

      - name: Send Daily Report to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 -c "
          import urllib.request, json, re, os
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone, timedelta
          from deep_translator import GoogleTranslator

          JST = timezone(timedelta(hours=9))
          today = datetime.now(JST).strftime('%Y/%m/%d')
          headers = {'User-Agent': 'Mozilla/5.0 (compatible; Googlebot/2.1)'}

          def translate(text):
              try:
                  return GoogleTranslator(source='en', target='ja').translate(text[:500])
              except:
                  return text

          def fetch_rss(url):
              req = urllib.request.Request(url, headers=headers)
              xml_data = urllib.request.urlopen(req, timeout=15).read().decode('utf-8')
              xml_data = re.sub(r'<\?xml[^>]+\?>', '', xml_data)
              root = ET.fromstring(xml_data)
              items = root.findall('.//item')
              results = []
              for item in items[:20]:
                  title = item.findtext('title') or ''
                  link = item.findtext('link') or ''
                  title = re.sub(r'<!\[CDATA\[(.*?)\]\]>', r'\1', title).strip()
                  link = link.strip()
                  if title:
                      results.append((title, link))
              return results

          # S&P500
          try:
              req = urllib.request.Request('https://finance.yahoo.co.jp/quote/%5EGSPC', headers=headers)
              html = urllib.request.urlopen(req, timeout=15).read().decode('utf-8')
              nums = re.findall(r'\d{1,2},\d{3}\.\d{2}', html)
              sp500 = '現在値: ' + nums[0] if nums else 'データ取得中'
          except Exception as e:
              sp500 = '取得エラー: ' + str(e)

          # AIニュース
          try:
              items = fetch_rss('https://techcrunch.com/category/artificial-intelligence/feed/')
              ai_lines = []
              for i, (t, l) in enumerate(items):
                  jp = translate(t)
                  ai_lines.append(str(i+1) + '. ' + jp + '\n   ' + l)
              ai_news = '\n'.join(ai_lines)
          except Exception as e:
              ai_news = '取得エラー: ' + str(e)

          # 国際ニュース
          try:
              items2 = fetch_rss('https://feeds.bbci.co.uk/news/business/rss.xml')
              world_lines = []
              for i, (t, l) in enumerate(items2):
                  jp = translate(t)
                  world_lines.append(str(i+1) + '. ' + jp + '\n   ' + l)
              world_news = '\n'.join(world_lines)
          except Exception as e:
              world_news = '取得エラー: ' + str(e)

          msg = '📰 *デイリーレポート（' + today + '）*\n\n📈 *S&P 500*\n' + sp500 + '\n🔗 https://finance.yahoo.co.jp/quote/%5EGSPC\n\n---\n\n🤖 *AI関連ニュース TOP20（日本語訳）*\n' + ai_news + '\n\n---\n\n🌍 *国際経済ニュース TOP20（日本語訳）*\n' + world_news
          data = json.dumps({'text': msg}).encode('utf-8')
          req4 = urllib.request.Request(os.environ['SLACK_WEBHOOK_URL'], data=data, headers={'Content-Type': 'application/json; charset=utf-8'})
          print(urllib.request.urlopen(req4, timeout=30).read().decode())
          "
