name: Daily Report to Slack

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Send Daily Report to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 -c "
          import urllib.request, json, re, os
          from datetime import datetime, timezone, timedelta
          JST = timezone(timedelta(hours=9))
          today = datetime.now(JST).strftime('%Y/%m/%d')
          try:
              req = urllib.request.Request('https://finance.yahoo.co.jp/quote/%5EGSPC', headers={'User-Agent': 'Mozilla/5.0'})
              html = urllib.request.urlopen(req, timeout=15).read().decode('utf-8')
              nums = re.findall(r'\d{1,2},\d{3}\.\d{2}', html)
              sp500 = '現在値: ' + nums[0] if nums else 'データ取得中'
          except Exception as e:
              sp500 = '取得エラー: ' + str(e)
          try:
              req2 = urllib.request.Request('https://news.google.com/rss/search?q=AI+artificial+intelligence&hl=ja&gl=JP&ceid=JP:ja', headers={'User-Agent': 'Mozilla/5.0'})
              rss = urllib.request.urlopen(req2, timeout=15).read().decode('utf-8')
              titles = re.findall(r'<title><!\[CDATA\[(.*?)\]\]></title>', rss)[1:21]
              ai_news = '\n'.join([str(i+1) + '. ' + t for i,t in enumerate(titles)])
          except Exception as e:
              ai_news = '取得エラー: ' + str(e)
          try:
              req3 = urllib.request.Request('https://feeds.reuters.com/reuters/businessNews', headers={'User-Agent': 'Mozilla/5.0'})
              rss2 = urllib.request.urlopen(req3, timeout=15).read().decode('utf-8')
              titles2 = re.findall(r'<title><!\[CDATA\[(.*?)\]\]></title>', rss2)[1:21]
              world_news = '\n'.join([str(i+1) + '. ' + t for i,t in enumerate(titles2)])
          except Exception as e:
              world_news = '取得エラー: ' + str(e)
          msg = '📰 *デイリーレポート（' + today + '）*\n\n📈 *S&P 500*\n' + sp500 + '\n🔗 https://finance.yahoo.co.jp/quote/%5EGSPC\n\n---\n\n🤖 *AI関連ニュース TOP20*\n' + ai_news + '\n\n---\n\n🌍 *国際ニュース TOP20*\n' + world_news
          data = json.dumps({'text': msg}).encode('utf-8')
          req4 = urllib.request.Request(os.environ['SLACK_WEBHOOK_URL'], data=data, headers={'Content-Type': 'application/json; charset=utf-8'})
          print(urllib.request.urlopen(req4, timeout=30).read().decode())
          "
